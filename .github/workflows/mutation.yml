name: Mutation Testing

on:
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  mutation-test:
    name: "Mutate: ${{ matrix.module }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - custom_components/roommind/coordinator.py
          - custom_components/roommind/control/
          - custom_components/roommind/managers/
          - custom_components/roommind/utils/
          - custom_components/roommind/store.py
          - custom_components/roommind/websocket_api.py
          - custom_components/roommind/sensor.py custom_components/roommind/climate.py custom_components/roommind/switch.py custom_components/roommind/binary_sensor.py custom_components/roommind/diagnostics.py custom_components/roommind/services/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "mutmut>=3.5"

      - name: Restore mutmut cache
        uses: actions/cache@v4
        with:
          path: .mutmut-cache
          key: mutmut-${{ hashFiles('custom_components/**/*.py') }}-${{ strategy.job-index }}
          restore-keys: |
            mutmut-${{ hashFiles('custom_components/**/*.py') }}-${{ strategy.job-index }}
            mutmut-

      - name: Run mutation testing
        run: |
          # mutmut exits 1 when mutants survive (expected), 2+ on real errors
          mutmut run ${{ matrix.module }} || EXIT=$?
          if [ "${EXIT:-0}" -ge 2 ]; then
            echo "::error::mutmut failed with exit code $EXIT"
            exit $EXIT
          fi

      - name: Generate report
        if: always()
        run: |
          # Stats summary (short, for GitHub Summary tab)
          mutmut results > /tmp/mutmut-full.txt 2>&1 || true
          grep -iE "killed|survived|total|score|untested|timeout" /tmp/mutmut-full.txt > /tmp/mutmut-stats.txt 2>/dev/null || true
          SURVIVED=$(grep -c "^Survived" /tmp/mutmut-full.txt 2>/dev/null || echo "0")

          echo "## Mutation: \`${{ matrix.module }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/mutmut-stats.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Survived mutants:** $SURVIVED" >> $GITHUB_STEP_SUMMARY

          # Full report with survived mutant details (downloadable artifact)
          MODULE_SLUG=$(echo "${{ matrix.module }}" | tr '/ ' '_' | sed 's/__*/_/g' | sed 's/^_//;s/_$//')
          REPORT="mutation-report-${MODULE_SLUG}.txt"
          echo "=== Mutation Report: ${{ matrix.module }} ===" > "$REPORT"
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "--- Stats ---" >> "$REPORT"
          cat /tmp/mutmut-stats.txt >> "$REPORT" 2>/dev/null || true
          echo "" >> "$REPORT"
          echo "Survived mutants: $SURVIVED" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "--- Survived Mutant Details ---" >> "$REPORT"
          mutmut show survived >> "$REPORT" 2>&1 || true
          echo "REPORT_FILE=$REPORT" >> $GITHUB_ENV

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-${{ strategy.job-index }}
          path: ${{ env.REPORT_FILE }}
          retention-days: 30
